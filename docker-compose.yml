  bouncer-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:

services:

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bouncer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bouncer
      POSTGRES_USER: bouncer
      POSTGRES_PASSWORD: bouncer_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bouncer-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bouncer -d bouncer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bouncer-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - bouncer-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ──────────────────────────────────────────────
  # RabbitMQ
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bouncer-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: bouncer
      RABBITMQ_DEFAULT_PASS: rabbit_secret
      RABBITMQ_DEFAULT_VHOST: bouncer_vhost
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI → http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - bouncer-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # Spring Boot App
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bouncer-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bouncer
      SPRING_DATASOURCE_USERNAME: bouncer
      SPRING_DATASOURCE_PASSWORD: bouncer_secret
      # Redis — hostname matches the service name above
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis_secret
      # RabbitMQ — hostname matches the service name above
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: bouncer
      SPRING_RABBITMQ_PASSWORD: rabbit_secret
      SPRING_RABBITMQ_VIRTUAL_HOST: bouncer_vhost
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    networks:
      - bouncer-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
